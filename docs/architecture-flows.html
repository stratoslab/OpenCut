<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCut — Architecture Flows</title>
<style>
  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #141414;
    --bg-tertiary: #1a1a1a;
    --bg-card: #1e1e1e;
    --border: #2a2a2a;
    --border-highlight: #3a3a3a;
    --text-primary: #e5e5e5;
    --text-secondary: #a0a0a0;
    --text-muted: #666;
    --accent: #3b82f6;
    --accent-dim: #1e3a5f;
    --accent-glow: rgba(59, 130, 246, 0.3);
    --success: #22c55e;
    --warning: #f59e0b;
    --destructive: #ef4444;
    --purple: #a855f7;
    --orange: #f97316;
    --pink: #ec4899;
    --cyan: #06b6d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
  }

  .header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .header h1 span {
    color: var(--text-muted);
    font-weight: 400;
    font-size: 0.875rem;
  }

  .version-badge {
    background: var(--accent);
    color: white;
    font-size: 0.625rem;
    padding: 0.125rem 0.375rem;
    border-radius: 4px;
    font-weight: 600;
  }

  .header-actions {
    display: flex;
    gap: 0.5rem;
  }

  .btn {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: var(--border); }
  .btn.active { background: var(--accent); border-color: var(--accent); }

  .main-layout {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    height: calc(100vh - 57px);
  }

  .sidebar {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1rem;
  }

  .sidebar h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    padding: 0 0.5rem;
  }

  .flow-list {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    margin-bottom: 1.5rem;
  }

  .flow-item {
    padding: 0.625rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.875rem;
    border: 1px solid transparent;
  }

  .flow-item:hover {
    background: var(--bg-tertiary);
    border-color: var(--border);
  }

  .flow-item.active {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .flow-item .flow-icon {
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .flow-item .flow-label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .category-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    padding: 0.75rem 0.5rem 0.375rem;
    display: flex;
    align-items: center;
    gap: 0.375rem;
  }

  .category-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .diagram-area {
    position: relative;
    overflow: auto;
    background: var(--bg-primary);
    background-image:
      radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
    background-size: 40px 40px;
  }

  .diagram-container {
    position: relative;
    min-width: 1200px;
    min-height: 800px;
    padding: 2rem;
  }

  svg.connections {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  svg.connections path {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
    transition: all 0.3s;
  }

  svg.connections path.highlighted {
    stroke: var(--accent);
    stroke-width: 3;
    filter: drop-shadow(0 0 6px var(--accent-glow));
  }

  svg.connections path.dimmed {
    stroke: var(--border);
    stroke-width: 1;
    opacity: 0.3;
  }

  .node {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    min-width: 140px;
    text-align: center;
    z-index: 2;
    transition: all 0.3s;
    cursor: default;
  }

  .node .node-icon {
    font-size: 1.25rem;
    margin-bottom: 0.25rem;
  }

  .node .node-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-primary);
  }

  .node .node-type {
    font-size: 0.625rem;
    color: var(--text-muted);
    margin-top: 0.125rem;
  }

  .node.highlighted {
    border-color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 20px var(--accent-glow);
    transform: scale(1.05);
  }

  .node.dimmed {
    opacity: 0.25;
    filter: grayscale(0.5);
  }

  .node.type-external { border-color: var(--text-muted); }
  .node.type-runtime { border-color: var(--cyan); }
  .node.type-wasm { border-color: var(--orange); }
  .node.type-deploy { border-color: var(--purple); }
  .node.type-server { border-color: var(--pink); }

  .annotation {
    position: absolute;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: 0.6875rem;
    z-index: 3;
    max-width: 220px;
    pointer-events: auto;
    transition: all 0.3s;
    opacity: 0;
    transform: translateY(5px);
  }

  .annotation.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .annotation.highlighted {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .annotation.dimmed {
    opacity: 0.1;
  }

  .annotation .annotation-action {
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .annotation .annotation-data {
    color: var(--text-secondary);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.625rem;
    word-break: break-all;
  }

  .detail-panel {
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.5rem;
  }

  .detail-panel h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .detail-panel .detail-description {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .detail-steps {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .detail-step {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    transition: all 0.2s;
  }

  .detail-step:hover {
    border-color: var(--border-highlight);
  }

  .detail-step .step-number {
    font-size: 0.625rem;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.375rem;
  }

  .detail-step .step-action {
    font-size: 0.8125rem;
    font-weight: 500;
    margin-bottom: 0.25rem;
  }

  .detail-step .step-flow {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.375rem;
  }

  .detail-step .step-data {
    font-size: 0.6875rem;
    color: var(--text-secondary);
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: var(--bg-primary);
    padding: 0.375rem 0.5rem;
    border-radius: 4px;
    word-break: break-all;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    padding: 2rem;
  }

  .empty-state .empty-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  .empty-state p {
    font-size: 0.875rem;
    line-height: 1.5;
  }

  .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--destructive);
    text-align: center;
    padding: 2rem;
  }

  .error-state .error-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  .error-state p {
    font-size: 0.875rem;
    line-height: 1.5;
    color: var(--text-secondary);
  }

  .legend {
    position: absolute;
    bottom: 1rem;
    left: 1rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    z-index: 10;
    font-size: 0.75rem;
  }

  .legend h3 {
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .legend-items {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.375rem;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .zoom-controls {
    position: absolute;
    bottom: 1rem;
    right: 1rem;
    display: flex;
    gap: 0.25rem;
    z-index: 10;
  }

  .zoom-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .zoom-btn:hover { background: var(--bg-tertiary); }

  @media (max-width: 1200px) {
    .main-layout {
      grid-template-columns: 240px 1fr 280px;
    }
  }

  @media (max-width: 900px) {
    .main-layout {
      grid-template-columns: 1fr;
    }
    .sidebar, .detail-panel {
      display: none;
    }
  }
</style>
</head>

<div class="header">

    <span>Interactive Flow Diagram</span>

  </h1>

</div>

<div class="main-layout">

          <div class="legend-item"><div class="legend-dot" style="background: var(--accent)"></div> Component</div>
          <div class="legend-item"><div class="legend-dot" style="background: var(--success)"></div> Manager</div>
          <div class="legend-item"><div class="legend-dot" style="background: var(--orange)"></div> WASM</div>
          <div class="legend-item"><div class="legend-dot" style="background: var(--purple)"></div> Deploy</div>
          <div class="legend-item"><div class="legend-dot" style="background: var(--pink)"></div> Server</div>
        </div>
      </div>

      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">+</button>

  <div class="detail-panel" id="detail-panel">

      <div class="empty-icon">📐</div>
      <p>Select a workflow from the sidebar to see the detailed flow between components</p>
    </div>
  </div>
</div>

const typeColors = {
  'external': 'var(--text-muted)',
  'runtime': 'var(--cyan)',
  'component': 'var(--accent)',
  'singleton': 'var(--success)',
  'manager': 'var(--success)',
  'wasm': 'var(--orange)',

  'state': 'var(--text-secondary)'
};

async function loadArchitectureData() {
  try {
    const response = await fetch('architecture-flows.json');
    if (!response.ok) {
      throw new Error(`Failed to load: ${response.status} ${response.statusText}`);
    }
    architectureData = await response.json();
    if (!architectureData || !architectureData.nodes || !architectureData.flows) {
      throw new Error('Invalid architecture data: missing nodes or flows');
    }
    const badge = document.getElementById('version-badge');
    if (badge && architectureData.version) {
      badge.textContent = `v${architectureData.version}`;
    }
  } catch (error) {
    console.error('Failed to load architecture data:', error);
    const area = document.getElementById('diagram-area');
    if (area) {
      area.innerHTML = `
        <div class="error-state">
          <div class="error-icon">⚠️</div>
          <p>Failed to load architecture-flows.json</p>
          <p style="font-size: 0.75rem; margin-top: 0.5rem; color: var(--text-muted);">${error.message}</p>
          <p style="font-size: 0.75rem; margin-top: 0.5rem; color: var(--text-muted);">Make sure architecture-flows.json is in the same directory as this HTML file.</p>
        </div>
      `;
    }
    throw error;
  }
}

function renderFlowList() {
  const container = document.getElementById('flow-list');
  container.innerHTML = '';

  const categories = {};
  architectureData.flows.forEach(flow => {
    if (!categories[flow.category]) categories[flow.category] = [];
    categories[flow.category].push(flow);
  });

  const categoryIcons = {
    'editing': '✏️',
    'ai': '🤖',
    'auth': '🔐',
    'assets': '📦',
    'planned': '📋',
    'deployment': '🚀',
    'core': '⚙️'
  };

  Object.entries(categories).forEach(([category, flows]) => {
    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = `${categoryIcons[category] || ''} ${category}`;
    container.appendChild(label);

    const list = document.createElement('div');
    list.className = 'flow-list';

    flows.forEach(flow => {
      const item = document.createElement('div');
      item.className = 'flow-item';
      item.dataset.flowId = flow.id;
      item.innerHTML = `
        <span class="flow-icon">${getFlowIcon(flow)}</span>
        <span class="flow-label">${flow.label}</span>
      `;
      item.addEventListener('click', () => selectFlow(flow.id));
      list.appendChild(item);
    });

    container.appendChild(list);
  });
}

function getFlowIcon(flow) {
  const icons = {

function renderNodes() {
  const container = document.getElementById('nodes-container');
  container.innerHTML = '';

  Object.entries(architectureData.nodes).forEach(([id, node]) => {
    const pos = nodePositions[id];
    if (!pos) return;

    const el = document.createElement('div');
    el.className = `node type-${node.type}`;
    el.id = `node-${id}`;
    el.style.left = `${pos.x}px`;
    el.style.top = `${pos.y}px`;
    el.innerHTML = `
      <div class="node-icon">${node.icon}</div>
      <div class="node-label">${node.label}</div>
      <div class="node-type">${node.type}${node.package ? ` · ${node.package}` : ''}</div>
    `;
    container.appendChild(el);
  });
}

function renderConnections() {
  const svg = document.getElementById('connections-svg');
  svg.innerHTML = '';

  const allSteps = [];
  architectureData.flows.forEach(flow => {
    flow.steps.forEach((step, i) => {
      allSteps.push({ ...step, flowId: flow.id, stepIndex: i });
    });
  });

  const uniqueConnections = new Map();
  allSteps.forEach(step => {
    const key = `${step.from}-${step.to}`;
    if (!uniqueConnections.has(key)) {
      uniqueConnections.set(key, []);
    }
    uniqueConnections.get(key).push(step);
  });

  uniqueConnections.forEach((steps, key) => {
    const fromPos = nodePositions[key.split('-')[0]];
    const toPos = nodePositions[key.split('-').slice(1).join('-')];
    if (!fromPos || !toPos) return;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.id = `path-${key}`;
    path.dataset.from = key.split('-')[0];
    path.dataset.to = key.split('-').slice(1).join('-');

    const dx = toPos.x - fromPos.x;
    const dy = toPos.y - fromPos.y;
    const cx = dx * 0.5;

    const d = `M ${fromPos.x + 70} ${fromPos.y + 30} C ${fromPos.x + 70 + cx} ${fromPos.y + 30}, ${toPos.x - 70 - cx} ${toPos.y + 30}, ${toPos.x - 70} ${toPos.y + 30}`;
    path.setAttribute('d', d);

    svg.appendChild(path);
  });
}

function selectFlow(flowId) {
  const flow = architectureData.flows.find(f => f.id === flowId);
  if (!flow) return;

  activeFlow = flow;

  document.querySelectorAll('.flow-item').forEach(el => {
    el.classList.toggle('active', el.dataset.flowId === flowId);
  });

  highlightFlow(flow);
  showDetailPanel(flow);
}

function highlightFlow(flow) {
  const activeNodes = new Set();
  const activePaths = new Set();

  flow.steps.forEach((step, i) => {
    activeNodes.add(step.from);
    activeNodes.add(step.to);
    activePaths.add(`${step.from}-${step.to}`);
  });

  document.querySelectorAll('.node').forEach(el => {
    const nodeId = el.id.replace('node-', '');
    el.classList.remove('highlighted', 'dimmed');
    if (activeNodes.has(nodeId)) {
      el.classList.add('highlighted');
    } else {
      el.classList.add('dimmed');
    }
  });

  document.querySelectorAll('#connections-svg path').forEach(path => {
    const key = `${path.dataset.from}-${path.dataset.to}`;
    path.classList.remove('highlighted', 'dimmed');
    if (activePaths.has(key)) {
      path.classList.add('highlighted');
    } else {
      path.classList.add('dimmed');
    }
  });

  renderAnnotations(flow);
}

function renderAnnotations(flow) {
  const container = document.getElementById('annotations-container');
  container.innerHTML = '';

  flow.steps.forEach((step, i) => {
    const fromPos = nodePositions[step.from];
    const toPos = nodePositions[step.to];
    if (!fromPos || !toPos) return;

    const el = document.createElement('div');
    el.className = 'annotation visible highlighted';
    el.style.left = `${(fromPos.x + toPos.x) / 2}px`;
    el.style.top = `${Math.min(fromPos.y, toPos.y) - 10}px`;
    el.innerHTML = `
      <div class="annotation-action">${step.action}</div>
      <div class="annotation-data">${step.data}</div>
    `;
    container.appendChild(el);
  });
}

function showDetailPanel(flow) {
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <h2>${getFlowIcon(flow)} ${flow.label}</h2>
    <p class="detail-description">${flow.description}</p>
    <div class="detail-steps">
      ${flow.steps.map((step, i) => `
        <div class="detail-step">
          <div class="step-number">Step ${i + 1}</div>
          <div class="step-action">${step.action}</div>
          <div class="step-flow">${architectureData.nodes[step.from]?.label || step.from} → ${architectureData.nodes[step.to]?.label || step.to}</div>
          <div class="step-data">${step.data}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function resetView() {
  activeFlow = null;
  document.querySelectorAll('.flow-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.node').forEach(el => {
    el.classList.remove('highlighted', 'dimmed');
  });
  document.querySelectorAll('#connections-svg path').forEach(path => {
    path.classList.remove('highlighted', 'dimmed');
  });
  document.getElementById('annotations-container').innerHTML = '';
  document.getElementById('detail-panel').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📐</div>
      <p>Select a workflow from the sidebar to see the detailed flow between components</p>
    </div>
  `;
}

function toggleExpandAll() {
  expandedAll = !expandedAll;
  document.getElementById('btn-expand').classList.toggle('active', expandedAll);
}

function zoomIn() {
  zoomLevel = Math.min(zoomLevel + 0.1, 2);
  applyZoom();
}

function zoomOut() {
  zoomLevel = Math.max(zoomLevel - 0.1, 0.5);
  applyZoom();
}

function applyZoom() {
  const container = document.getElementById('diagram-container');
  container.style.transform = `scale(${zoomLevel})`;
  container.style.transformOrigin = 'top left';
}

async function init() {
  await loadArchitectureData();
  renderFlowList();
  renderNodes();
  renderConnections();
}

init();
