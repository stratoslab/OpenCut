name: Bun CI

concurrency:
  group: bun-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      DATABASE_URL: "postgresql://opencut:opencut@localhost:5432/opencut"
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-placeholder' }}
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL || 'https://placeholder.example.com' }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN || 'placeholder' }}
      NEXT_PUBLIC_MARBLE_API_URL: "https://placeholder.example.com"
      MARBLE_WORKSPACE_KEY: ${{ secrets.MARBLE_WORKSPACE_KEY || 'placeholder' }}
      FREESOUND_CLIENT_ID: ${{ secrets.FREESOUND_CLIENT_ID || 'placeholder' }}
      FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY || 'placeholder' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build WASM
        run: wasm-pack build rust/wasm --target bundler --out-dir pkg

      - name: Install Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: 1.2.18

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.2.18-${{ hashFiles('apps/web/bun.lock') }}

      - name: Install dependencies
        working-directory: apps/web
        run: bun install

      - name: Build
        working-directory: apps/web
        run: bun run build

      - name: Check performance budget
        working-directory: apps/web
        run: |
          echo "=== Performance Budget Check ==="
          FAIL=0

          # Check .next/static size (JS + CSS bundles)
          if [ -d ".next/static" ]; then
            STATIC_SIZE=$(du -sk .next/static | cut -f1)
            echo "Static bundle: ${STATIC_SIZE}KB (budget: 1500KB)"
            if [ "$STATIC_SIZE" -gt 1500 ]; then
              echo "FAIL: Static bundle exceeds 1500KB budget"
              FAIL=1
            fi
          fi

          # Check standalone server size
          if [ -d ".next/standalone" ]; then
            STANDALONE_SIZE=$(du -sk .next/standalone | cut -f1)
            echo "Standalone server: ${STANDALONE_SIZE}KB (budget: 5000KB)"
            if [ "$STANDALONE_SIZE" -gt 5000 ]; then
              echo "FAIL: Standalone server exceeds 5000KB budget"
              FAIL=1
            fi
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "Performance budget exceeded. To override, add a comment explaining why."
            exit 1
          fi

          echo "All checks passed."

      - name: Run tests
        working-directory: apps/web
        run: bun test
